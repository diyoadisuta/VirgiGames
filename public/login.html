<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Virgi's Game Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            z-index: 5;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 44px 36px;
            box-shadow: var(--shadow-premium), 0 0 40px rgba(255, 59, 139, 0.1);
            text-align: center;
            animation: cardEntrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes cardEntrance {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .auth-logo {
            font-size: 3.2rem;
            margin-bottom: 12px;
            display: inline-block;
            animation: logoBounce 2.5s infinite alternate ease-in-out;
        }

        @keyframes logoBounce {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-8px) scale(1.05) rotate(5deg); }
        }

        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
            letter-spacing: -0.01em;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid var(--glass-border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all var(--transition-fast);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--pink);
            box-shadow: 0 0 14px var(--pink-glow);
            background: rgba(0, 0, 0, 0.55);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            border-radius: var(--radius-md);
            background: var(--gradient-primary);
            color: var(--bg-primary);
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.06em;
            margin-top: 12px;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px var(--pink-glow);
            transition: all var(--transition-spring);
        }
        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px var(--pink-glow);
        }
        .auth-btn:active {
            transform: translateY(0);
        }
        .auth-btn:disabled {
            background: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            color: var(--bg-secondary);
        }

        .auth-links {
            margin-top: 28px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .auth-links a {
            color: var(--yellow);
            text-decoration: none;
            font-weight: 700;
            transition: color var(--transition-fast);
        }
        .auth-links a:hover {
            color: var(--yellow-light);
            text-decoration: underline;
        }

        .error-msg {
            color: #ff5e5e;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            background: rgba(255, 94, 94, 0.12);
            border: 1px solid rgba(255, 94, 94, 0.25);
            padding: 12px;
            border-radius: var(--radius-md);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .back-home {
            margin-top: 28px;
        }
        .back-home a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: color var(--transition-fast), transform var(--transition-fast);
            display: inline-block;
        }
        .back-home a:hover {
            color: var(--text-primary);
            transform: translateX(-3px);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">🎮</div>
            <h1 class="auth-title">Welcome Back</h1>
            <div id="error-msg" class="error-msg"></div>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" required autocomplete="username" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required autocomplete="current-password" placeholder="Enter your password">
                </div>
                <button type="submit" class="auth-btn">Login to Play</button>
            </form>
            <div class="auth-links">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
            <div class="back-home">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error-msg');
            const btn = document.querySelector('.auth-btn');
            
            btn.textContent = 'Logging in...'; btn.disabled = true;
            err.style.display = 'none';
            
            try {
                const res = await fetch(BACKEND_URL + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.ok) { window.location.href = '/play.html'; }
                else { 
                    err.textContent = data.error; 
                    err.style.display = 'block'; 
                    btn.textContent = 'Login to Play'; 
                    btn.disabled = false; 
                }
            } catch(e) {
                err.textContent = 'Network error. Please try again.'; err.style.display = 'block';
                btn.textContent = 'Login to Play'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
