<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Virgi's Game Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px; position: relative;
        }
        .auth-bg {
            position: absolute; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(233,77,139,0.15) 0%, var(--bg-primary) 70%);
        }
        .auth-card {
            width: 100%; max-width: 400px;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
            padding: 40px 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
        }
        .auth-logo { font-size: 3rem; margin-bottom: 10px; }
        .auth-title {
            font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800;
            background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input {
            width: 100%; padding: 14px 16px; border-radius: var(--radius-md);
            background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            color: var(--text-primary); font-family: 'Inter', sans-serif;
            transition: all var(--transition-fast);
        }
        .form-input:focus { outline: none; border-color: var(--yellow); box-shadow: 0 0 10px var(--yellow-glow); }
        .auth-btn {
            width: 100%; padding: 14px; border-radius: var(--radius-md);
            background: var(--gradient-primary); color: var(--bg-primary);
            font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem;
            margin-top: 10px; border: none; cursor: pointer;
            box-shadow: 0 4px 15px var(--pink-glow); transition: all var(--transition-base);
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--pink-glow); }
        .auth-links { margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary); }
        .auth-links a { color: var(--yellow); text-decoration: none; font-weight: 500; }
        .auth-links a:hover { text-decoration: underline; }
        .error-msg {
            color: #ff6b6b; font-size: 0.9rem; margin-bottom: 15px; display: none;
            background: rgba(255,107,107,0.1); padding: 10px; border-radius: var(--radius-sm);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-bg"></div>
        <div class="auth-card">
            <div class="auth-logo">🎮</div>
            <h1 class="auth-title">Welcome Back</h1>
            <div id="error-msg" class="error-msg"></div>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required autocomplete="current-password">
                </div>
                <button type="submit" class="auth-btn">Login to Play</button>
            </form>
            <div class="auth-links">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
            <div style="margin-top:20px"><a href="index.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.8rem;">← Back to Home</a></div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error-msg');
            const btn = document.querySelector('.auth-btn');
            
            btn.textContent = 'Logging in...'; btn.disabled = true;
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.ok) { window.location.href = '/play'; }
                else { err.textContent = data.error; err.style.display = 'block'; btn.textContent = 'Login to Play'; btn.disabled = false; }
            } catch(e) {
                err.textContent = 'Network error. Please try again.'; err.style.display = 'block';
                btn.textContent = 'Login to Play'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
