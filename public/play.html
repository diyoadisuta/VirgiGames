<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Play — Virgi's Pout Game Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
    <style>
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .user-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--yellow);
            text-shadow: 0 0 10px rgba(255, 210, 20, 0.2);
        }
        .logout-btn {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            padding: 5px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.02);
            transition: all var(--transition-fast);
            letter-spacing: 0.04em;
        }
        .logout-btn:hover {
            background: rgba(255, 59, 139, 0.08);
            border-color: rgba(255, 59, 139, 0.35);
            color: var(--text-primary);
            box-shadow: 0 0 10px rgba(255, 59, 139, 0.15);
        }
        
        /* Premium Lobby Overlay */
        .lobby-overlay {
            position: absolute;
            inset: 0;
            z-index: 50;
            background: rgba(10, 7, 18, 0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-lg);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-base);
        }
        .lobby-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .lobby-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border-glow);
            border-radius: var(--radius-md);
            padding: 36px 28px;
            width: 88%;
            max-width: 340px;
            text-align: center;
            box-shadow: var(--shadow-premium), 0 0 30px rgba(255, 59, 139, 0.15);
            animation: lobbyPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes lobbyPop {
            0% { transform: scale(0.9) translateY(15px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .lobby-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.35rem;
            margin-bottom: 24px;
            color: var(--yellow);
            letter-spacing: 0.02em;
            text-shadow: 0 0 15px var(--yellow-glow);
        }
        .room-code-display {
            font-family: 'Outfit', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: rgba(0, 0, 0, 0.4);
            padding: 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            color: var(--pink);
            border: 1px solid var(--glass-border);
            text-shadow: 0 0 15px var(--pink-glow);
        }
        .lobby-input {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.35);
            color: var(--text-primary);
            font-family: 'Outfit', monospace;
            font-weight: 800;
            font-size: 1.3rem;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 18px;
            letter-spacing: 4px;
            transition: all var(--transition-fast);
        }
        .lobby-input:focus {
            outline: none;
            border-color: var(--yellow);
            box-shadow: 0 0 14px var(--yellow-glow);
            background: rgba(0, 0, 0, 0.5);
        }
        .lobby-btn {
            width: 100%;
            padding: 13px;
            border-radius: var(--radius-md);
            border: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.95rem;
            letter-spacing: 0.06em;
            background: var(--gradient-primary);
            color: var(--bg-primary);
            cursor: pointer;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px var(--pink-glow);
            transition: all var(--transition-spring);
        }
        .lobby-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--pink-glow);
        }
        .lobby-btn.secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            box-shadow: none;
        }
        .lobby-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--yellow);
            transform: translateY(-2px);
        }
        
        /* Elegant loader */
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--yellow);
            animation: spin 0.8s linear infinite;
            margin-top: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Online banner status */
        .online-status {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 20;
            background: rgba(10, 7, 18, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border-glow);
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: var(--text-primary);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
            box-shadow: 0 0 10px #2ecc71, 0 0 20px #2ecc71;
            animation: pulseDot 1.6s infinite alternate;
        }
        @keyframes pulseDot {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.15); opacity: 1; }
        }
    </style>
</head>
<body>
    <header id="main-header">
        <div class="header-content">
            <div class="header-logo"><span class="logo-icon">🎮</span></div>
            <h1 id="site-title">VIRGI'S POUT GAME CENTER</h1>
            <div class="user-info">
                <span class="user-name" id="display-username">Loading...</span>
                <button class="logout-btn" id="btn-logout">Logout</button>
            </div>
        </div>
    </header>

    <main id="game-stage">
        <div class="stage-image-wrap" id="stage-wrap">
            <img src="1779190954098.webp" alt="Virgi" class="stage-image" id="stage-image">
            <div class="stage-vignette"></div>

            <div class="online-status" id="online-status" style="display:none">
                <div class="status-dot"></div> <span id="opponent-name">Playing vs ...</span>
            </div>

            <!-- Lobby Overlay -->
            <div class="lobby-overlay" id="lobby-overlay">
                <!-- Create/Join Choice -->
                <div class="lobby-card" id="lobby-choice">
                    <div class="lobby-title">Online Multiplayer</div>
                    <button class="lobby-btn" id="btn-create-room">Create Room</button>
                    <div style="margin:16px 0; font-size:0.8rem; font-weight:700; color:var(--text-muted)">OR</div>
                    <input type="text" class="lobby-input" id="join-code" placeholder="ENTER CODE" maxlength="6">
                    <button class="lobby-btn secondary" id="btn-join-room">Join Room</button>
                    <div id="lobby-error" style="color:#ff5e5e; font-size:0.85rem; font-weight:600; margin-top:14px; display:none; background:rgba(255,94,94,0.1); padding:8px; border-radius:6px;"></div>
                </div>

                <!-- Waiting for opponent -->
                <div class="lobby-card" id="lobby-waiting" style="display:none">
                    <div class="lobby-title">Waiting for friend...</div>
                    <div style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:12px">Share this code to play:</div>
                    <div class="room-code-display" id="display-code">------</div>
                    <div class="loading-spinner"></div>
                    <button class="lobby-btn secondary" id="btn-cancel-room" style="margin-top:20px">Cancel</button>
                </div>
            </div>

            <div class="forehead-game" id="forehead-game"></div>
            <div class="float-status" id="game-status">Your Turn (X)</div>
        </div>

        <div class="controls-bar">
            <div class="mode-toggle" id="mode-toggle">
                <button class="mode-btn active" data-mode="ai" id="btn-mode-ai">🤖 vs AI</button>
                <button class="mode-btn" data-mode="local" id="btn-mode-local">👥 Local</button>
                <button class="mode-btn" data-mode="online" id="btn-mode-online">🌐 Online</button>
            </div>
            
            <div class="carousel-track" id="carousel-track">
                <button class="game-btn active" data-game="tictactoe">
                    <span class="btn-emoji">#</span><span class="game-label">TIC-TAC-TOE</span>
                </button>
                <button class="game-btn" data-game="snakes">
                    <span class="btn-emoji">🐍</span><span class="game-label">SNAKES</span>
                </button>
                <button class="game-btn" data-game="ludo">
                    <span class="btn-emoji">🎲</span><span class="game-label">LUDO</span>
                </button>
                <button class="game-btn" data-game="chess">
                    <span class="btn-emoji">♟️</span><span class="game-label">CHESS</span>
                </button>
            </div>
            <button class="control-btn" id="btn-reset">↻ Reset Game</button>
        </div>
    </main>

    <footer id="main-footer"><p>Made with <span class="heart">💛</span> for Virgi</p></footer>

    <script src="tictactoe.js"></script>
    <script src="snakes.js"></script>
    <script src="ludo.js"></script>
    <script src="chess.js"></script>
    <script src="app.js"></script>
</body>
</html>
